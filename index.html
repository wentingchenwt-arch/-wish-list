<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🌟 人生30000天心愿清单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#FF6B6B;--primary-light:#FFE8E8;--bg:#FFF8F0;--card:#FFFFFF;
  --text:#2D3436;--text2:#636E72;--text3:#B2BEC3;--border:#F0F0F0;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.06);
  --green:#4ECDC4;--green-light:#E8FBF9;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.page{display:none;min-height:100vh;padding-bottom:72px}
.page.active{display:block}

/* === Top Bar === */
.topbar{position:sticky;top:0;z-index:100;background:rgba(255,248,240,.92);backdrop-filter:blur(12px);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.topbar h1{font-size:17px;font-weight:700}
.topbar-back{background:none;border:none;font-size:20px;cursor:pointer;padding:2px 8px 2px 0;color:var(--text)}

/* === Toast === */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(45,52,54,.9);color:#fff;padding:8px 18px;border-radius:18px;font-size:12px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ========== ONBOARDING ========== */
.onboard{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
.onboard-logo{font-size:56px;margin-bottom:12px}
.onboard-title{font-size:24px;font-weight:700;margin-bottom:6px}
.onboard-sub{font-size:14px;color:var(--text2);margin-bottom:32px;line-height:1.6}
.onboard-input{width:100%;max-width:280px;padding:14px 16px;border:2px solid var(--border);border-radius:12px;font-size:16px;text-align:center;outline:none;margin-bottom:16px;transition:border-color .2s}
.onboard-input:focus{border-color:var(--primary)}
.onboard-btn{width:100%;max-width:280px;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--primary),#FF8E8E);color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:transform .1s,opacity .1s}
.onboard-btn:active{transform:scale(.97);opacity:.9}
.onboard-btn:disabled{opacity:.4;pointer-events:none}

/* Step 2: Select wishes */
.onboard-step2{min-height:100vh;padding-bottom:80px}
.step2-header{position:sticky;top:0;z-index:100;background:rgba(255,248,240,.95);backdrop-filter:blur(12px);padding:14px 16px;border-bottom:1px solid var(--border)}
.step2-title{font-size:16px;font-weight:700;margin-bottom:4px}
.step2-sub{font-size:12px;color:var(--text2)}
.step2-select-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.step2-select-left{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.step2-btns{display:flex;gap:14px}
.sel-btn2{font-size:12px;color:var(--primary);background:none;border:none;cursor:pointer}

/* Big/Small Category cards in onboard */
.obig-cat{margin:8px 16px;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.obig-head{display:flex;align-items:center;padding:12px 14px;gap:10px;cursor:pointer}
.obig-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.obig-title{font-size:14px;font-weight:600;flex:1}
.obig-count{font-size:11px;color:var(--text2);margin-right:4px}
.obig-arrow{font-size:11px;color:var(--text3);transition:transform .2s}
.obig-arrow.open{transform:rotate(180deg)}
.obig-body{padding:0 14px 8px;display:none}
.obig-body.open{display:block}
.osmall{display:flex;align-items:center;padding:8px 10px;margin-bottom:4px;background:var(--bg);border-radius:8px;gap:8px}
.osmall-name{font-size:13px;flex:1}
.osmall-count{font-size:11px;color:var(--text2)}

/* Custom wish add in onboard */
.oadd-row{display:flex;gap:6px;padding:8px 14px 12px}
.oadd-input{flex:1;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.oadd-input:focus{border-color:var(--primary)}
.oadd-btn{padding:8px 14px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}

/* Step2 fixed bottom */
.step2-bottom{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));background:rgba(255,248,240,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);z-index:150;display:flex;gap:10px;align-items:center}
.step2-info{font-size:12px;color:var(--text2);flex:1}
.step2-next{padding:12px 28px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--primary),#FF8E8E);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.step2-next:disabled{opacity:.4;pointer-events:none}

/* ========== HOME PAGE ========== */
.home-stats{display:flex;gap:0;margin:12px 16px;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.home-stat{flex:1;text-align:center;padding:16px 8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .15s}
.home-stat:active{background:var(--bg)}
.home-stat .num{font-size:22px;font-weight:700;color:var(--primary)}
.home-stat .label{font-size:11px;color:var(--text2);margin-top:2px}
.home-stat.green .num{color:var(--green)}

/* Filter bar */
.filter-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{white-space:nowrap;padding:6px 14px;border-radius:18px;font-size:12px;font-weight:500;background:var(--card);color:var(--text2);border:1.5px solid var(--border);cursor:pointer;flex-shrink:0;transition:all .15s}
.filter-chip.active{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}

/* Wish list on home */
.wish-section{padding:0 16px 80px}
.wish-group-title{font-size:13px;font-weight:600;color:var(--text2);padding:10px 0 6px;display:flex;align-items:center;gap:6px}
.wish-item{display:flex;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
.wish-item:last-child{border-bottom:none}
.wish-cb{width:22px;height:22px;border-radius:50%;border:2px solid var(--text3);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;margin-top:1px}
.wish-cb.checked{background:var(--green);border-color:var(--green)}
.wish-cb.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700}
.wish-content{flex:1;min-width:0}
.wish-text{font-size:14px;line-height:1.5}
.wish-text.done{text-decoration:line-through;color:var(--text3)}
.wish-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
.wish-cat-tag{font-size:10px;color:var(--primary);background:var(--primary-light);padding:1px 7px;border-radius:10px;white-space:nowrap}
.wish-duration{font-size:10px;color:var(--text3)}
.wish-edit-btn{background:none;border:none;font-size:12px;color:var(--text3);cursor:pointer;padding:4px 6px;border-radius:4px}
.wish-edit-btn:active{background:var(--bg)}

/* Home bottom add */
.home-add-bar{display:flex;gap:8px;padding:10px 16px;background:var(--card);border-top:1px solid var(--border);position:fixed;bottom:56px;left:0;right:0;z-index:140;padding-bottom:max(10px,env(safe-area-inset-bottom))}
.home-add-input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.home-add-input:focus{border-color:var(--primary)}
.home-add-btn{padding:10px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}

/* ========== ADD PAGE ========== */
.add-section{padding:16px}
.add-section h3{font-size:14px;font-weight:600;margin-bottom:12px}
.add-input{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;margin-bottom:12px}
.add-input:focus{border-color:var(--primary)}
.cat-selector{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.cat-chip{padding:6px 12px;border-radius:16px;font-size:12px;background:var(--card);border:1.5px solid var(--border);color:var(--text2);cursor:pointer;transition:all .15s}
.cat-chip.active{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.add-btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--primary),#FF8E8E);color:#fff;font-size:15px;font-weight:600;cursor:pointer}
.add-btn:active{transform:scale(.98);opacity:.9}

.recent-list{margin-top:20px}
.recent-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px}
.recent-item:last-child{border-bottom:none}
.recent-cat{font-size:11px;color:var(--primary);background:var(--primary-light);padding:2px 8px;border-radius:10px;white-space:nowrap}
.recent-text{font-size:13px;flex:1}

/* ========== SETTINGS PAGE ========== */
.settings-header{padding:24px 16px;text-align:center}
.settings-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#FF8E8E);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:28px;font-weight:600;margin-bottom:10px}
.settings-name{font-size:20px;font-weight:700}
.settings-menu{margin:0 16px}
.settings-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.settings-item:last-child{border-bottom:none}
.settings-icon{font-size:18px;width:28px;text-align:center}
.settings-text{flex:1;font-size:14px}
.settings-arrow{color:var(--text3);font-size:12px}

/* ========== SHARE PAGE ========== */
.share-preview{margin:16px;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);text-align:center}
.share-img{width:100%;min-height:200px;background:linear-gradient(135deg,var(--primary),#FF8E8E);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:32px 20px}
.share-img .name{font-size:24px;font-weight:700;margin-bottom:6px}
.share-img .stats{font-size:14px;opacity:.85;margin-bottom:12px}
.share-img .slogan{font-size:11px;opacity:.7}
.share-actions{padding:16px;display:flex;gap:10px}
.share-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.share-btn.primary{background:linear-gradient(135deg,var(--primary),#FF8E8E);color:#fff}
.share-btn.secondary{background:var(--bg);color:var(--text)}

/* ========== Bottom Navigation ========== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(255,248,240,.96);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding-bottom:max(4px,env(safe-area-inset-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:color .15s;color:var(--text3)}
.nav-item.active{color:var(--primary)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;margin-top:3px;font-weight:500}

/* ========== Modal ========== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:18px;padding:24px 20px;width:min(360px,90vw);max-height:80vh;overflow-y:auto}
.modal h2{font-size:17px;font-weight:700;margin-bottom:14px;text-align:center}
.modal-close{float:right;background:none;border:none;font-size:18px;cursor:pointer;color:var(--text3)}
.modal input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;margin-bottom:10px;outline:none}
.modal input:focus{border-color:var(--primary)}
.modal-btn{width:100%;padding:13px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}

/* Checkbox helper */
.cb{width:20px;height:20px;border-radius:50%;border:2px solid var(--text3);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.cb.checked{background:var(--primary);border-color:var(--primary)}
.cb.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.cb.partial{border-color:var(--primary)}
.cb.partial::after{content:'';width:10px;height:2px;background:var(--primary);border-radius:1px}

/* Re-select page (reuse onboard styles) */
.reselect-page{display:none;min-height:100vh;padding-bottom:80px}
.reselect-page.active{display:block}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .emoji{font-size:40px;margin-bottom:10px}
.empty-state .msg{font-size:14px}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .25s ease}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ====== ONBOARDING STEP 1: NAME ====== -->
<div class="page" id="pageOnboard1">
  <div class="onboard">
    <div class="onboard-logo">🌟</div>
    <div class="onboard-title">人生30000天</div>
    <div class="onboard-sub">心愿清单，记录你想做的每一件事<br>不设限，慢慢来</div>
    <input class="onboard-input" id="nameInput" placeholder="你的名字" maxlength="20" autofocus>
    <button class="onboard-btn" id="nameNextBtn" onclick="goToStep2()" disabled>开始选心愿 →</button>
  </div>
</div>

<!-- ====== ONBOARDING STEP 2: SELECT WISHES ====== -->
<div class="page" id="pageOnboard2">
  <div class="step2-header">
    <div class="step2-title" id="step2Title">挑选你感兴趣的心愿</div>
    <div class="step2-sub">选择分类，也可以自己添加</div>
  </div>
  <div class="step2-select-bar">
    <div class="step2-select-left">
      <div class="cb" id="obSelectAllCb" onclick="obToggleSelectAll()"></div>
      <span>全选</span>
    </div>
    <div class="step2-btns">
      <button class="sel-btn2" onclick="obSelectAll()">全选</button>
      <button class="sel-btn2" onclick="obDeselectAll()">全不选</button>
    </div>
  </div>
  <div id="obCategoryList"></div>
  <!-- Custom wish add in onboard -->
  <div style="padding:12px 16px">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)">✨ 自定义心愿</div>
    <div class="oadd-row" style="padding:0">
      <input class="oadd-input" id="obCustomInput" placeholder="写下你的心愿..." maxlength="100">
      <button class="oadd-btn" onclick="obAddCustom()">添加</button>
    </div>
  </div>
  <div class="step2-bottom">
    <div class="step2-info" id="step2Info">已选 0 个分类</div>
    <button class="step2-next" id="step2NextBtn" onclick="finishOnboard()" disabled>下一步 →</button>
  </div>
</div>

<!-- ====== HOME PAGE ====== -->
<div class="page" id="pageHome">
  <div class="topbar">
    <h1 id="homeTitle">🌟 心愿清单</h1>
  </div>
  <div class="home-stats" id="homeStats"></div>
  <div class="filter-bar" id="filterBar"></div>
  <div class="wish-section" id="wishSection"></div>
  <div class="home-add-bar" id="homeAddBar">
    <input class="home-add-input" id="homeAddInput" placeholder="添加心愿..." maxlength="100">
    <button class="home-add-btn" onclick="addWishFromHome()">添加</button>
  </div>
</div>

<!-- ====== ADD PAGE ====== -->
<div class="page" id="pageAdd">
  <div class="topbar"><h1>✨ 添加心愿</h1></div>
  <div class="add-section">
    <h3>写下你的心愿</h3>
    <input class="add-input" id="addWishInput" placeholder="比如：去冰岛看一次极光" maxlength="100">
    <h3>选择分类</h3>
    <div class="cat-selector" id="addCatSelector"></div>
    <button class="add-btn" onclick="addWishFromAddPage()">添加心愿 ✨</button>
    <div class="recent-list" id="recentList"></div>
  </div>
</div>

<!-- ====== SETTINGS PAGE ====== -->
<div class="page" id="pageSettings">
  <div class="topbar"><h1>⚙️ 设置</h1></div>
  <div class="settings-header">
    <div class="settings-avatar" id="settingsAvatar">?</div>
    <div class="settings-name" id="settingsName">未设置</div>
  </div>
  <div class="settings-menu" id="settingsMenu"></div>
</div>

<!-- ====== SHARE PAGE ====== -->
<div class="page" id="pageShare">
  <div class="topbar"><h1>📤 分享</h1></div>
  <div class="share-preview" id="sharePreview"></div>
</div>

<!-- ====== RE-SELECT PAGE (modal-like full page) ====== -->
<div class="reselect-page" id="pageReselect">
  <div class="step2-header">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="topbar-back" onclick="closeReselect()">←</button>
      <div>
        <div class="step2-title">重新选择心愿</div>
        <div class="step2-sub">调整分类，也可以自己添加</div>
      </div>
    </div>
  </div>
  <div class="step2-select-bar">
    <div class="step2-select-left">
      <div class="cb" id="rsSelectAllCb" onclick="rsToggleSelectAll()"></div>
      <span>全选</span>
    </div>
    <div class="step2-btns">
      <button class="sel-btn2" onclick="rsSelectAll()">全选</button>
      <button class="sel-btn2" onclick="rsDeselectAll()">全不选</button>
    </div>
  </div>
  <div id="rsCategoryList"></div>
  <div style="padding:12px 16px">
    <div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text2)">✨ 自定义心愿</div>
    <div class="oadd-row" style="padding:0">
      <input class="oadd-input" id="rsCustomInput" placeholder="写下你的心愿..." maxlength="100">
      <button class="oadd-btn" onclick="rsAddCustom()">添加</button>
    </div>
  </div>
  <div class="step2-bottom">
    <div class="step2-info" id="rsInfo">已选 0 个分类</div>
    <button class="step2-next" onclick="finishReselect()">完成</button>
  </div>
</div>

<!-- ====== Bottom Navigation ====== -->
<div class="bottom-nav" id="bottomNav" style="display:none">
  <div class="nav-item active" onclick="switchPage('pageHome')" data-page="pageHome">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">首页</div>
  </div>
  <div class="nav-item" onclick="switchPage('pageAdd')" data-page="pageAdd">
    <div class="nav-icon">➕</div>
    <div class="nav-label">添加</div>
  </div>
  <div class="nav-item" onclick="switchPage('pageSettings')" data-page="pageSettings">
    <div class="nav-icon">⚙️</div>
    <div class="nav-label">设置</div>
  </div>
  <div class="nav-item" onclick="switchPage('pageShare')" data-page="pageShare">
    <div class="nav-icon">📤</div>
    <div class="nav-label">分享</div>
  </div>
</div>

<!-- ====== Edit Wish Modal ====== -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeEditModal()">✕</button>
    <h2>编辑心愿</h2>
    <input id="editWishInput" placeholder="心愿内容" maxlength="100">
    <button class="modal-btn" onclick="saveEditWish()">保存</button>
  </div>
</div>

<!-- ====== Name Change Modal ====== -->
<div class="modal-overlay" id="nameModal">
  <div class="modal">
    <button class="modal-close" onclick="closeNameModal()">✕</button>
    <h2>修改名字</h2>
    <input id="newNameInput" placeholder="新名字" maxlength="20">
    <button class="modal-btn" onclick="saveNewName()">保存</button>
  </div>

// === Persistence ===
function loadData() {
  const r = localStorage.getItem('wishList_v10');
  appData = r ? JSON.parse(r) : null;
}
function saveData() { localStorage.setItem('wishList_v10', JSON.stringify(appData)); }
function isNewUser() { return !appData || !appData.onboarded; }

// === Stats ===
function getStats() {
  if (!appData) return {total:0,done:0,pct:0};
  let total = 0, done = 0;
  for (let cat in appData.wishes) {
    for (let w of appData.wishes[cat]) {
      total++;
      if (appData.completed[cat+'::'+w]) done++;
    }
  }
  return { total, done, pct: total > 0 ? Math.round(done/total*100) : 0 };
}

// === Init ===
function init() {
  loadData();
  if (isNewUser()) {
    showPage('pageOnboard1');
    document.getElementById('bottomNav').style.display = 'none';
  } else {
    showPage('pageHome');
    document.getElementById('bottomNav').style.display = 'flex';
    renderHome();
  }
}

// === Page switching ===
function showPage(id) {
  document.querySelectorAll('.page, .reselect-page').forEach(p => p.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  // Bottom nav visibility
  const mainPages = ['pageHome','pageAdd','pageSettings','pageShare'];
  document.getElementById('bottomNav').style.display = mainPages.includes(id) ? 'flex' : 'none';
  // Nav highlight
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === id));
}

function switchPage(id) {
  showPage(id);
  if (id === 'pageHome') renderHome();
  if (id === 'pageAdd') renderAddPage();
  if (id === 'pageSettings') renderSettings();
  if (id === 'pageShare') renderShare();
}

function renderObCategoryList() {
  const el = document.getElementById('obCategoryList');
  el.innerHTML = buildCategoryListHTML('ob');
  updateObSelectAll();
  updateObInfo();
}

function buildCategoryListHTML(prefix) {
  let html = '', idx = 0;
  for (let bigCat in HIERARCHY) {
    const color = catColorMap[bigCat], icon = CAT_ICONS[bigCat] || '📌', smallCats = HIERARCHY[bigCat];
    let totalWishes = 0;
    for (let sc in smallCats) totalWishes += smallCats[sc].length;
    const allSel = Object.keys(smallCats).every(sc => appData.selectedSmallCats[sc]);
    const partial = !allSel && Object.keys(smallCats).some(sc => appData.selectedSmallCats[sc]);
    html += `<div class="obig-cat fade-in" style="animation-delay:${idx*30}ms">
      <div class="obig-head" onclick="toggleBigCatBody(this)">
        <div class="cb ${allSel?'checked':partial?'partial':''}" onclick="event.stopPropagation();${prefix}ToggleBigCat('${bigCat}')"></div>
        <div class="obig-icon" style="background:${color}22;color:${color}">${icon}</div>
        <div class="obig-title">${bigCat}</div>
        <div class="obig-count">${Object.keys(smallCats).length}分类 · ${totalWishes}项</div>
        <div class="obig-arrow">▾</div>
      </div>
      <div class="obig-body">`;
    for (let sc in smallCats) {
      const isSel = appData.selectedSmallCats[sc];
      html += `<div class="osmall">
        <div class="cb ${isSel?'checked':''}" onclick="${prefix}ToggleSmallCat('${bigCat}','${sc}')"></div>
        <div class="osmall-name">${sc}</div>
        <div class="osmall-count">${smallCats[sc].length}个</div>
      </div>`;
    }
    html += '</div></div>';
    idx++;
  }
  // Custom categories
  if (appData.customCats && appData.customCats.length > 0) {
    html += '<div style="padding:8px 16px"><div style="font-size:12px;color:var(--text2);font-weight:600;margin-bottom:4px">自定义分类</div></div>';
    appData.customCats.forEach(sc => {
      const isSel = appData.selectedSmallCats[sc];
      const wishes = appData.wishes[sc] || [];
      html += `<div class="obig-cat"><div class="osmall" style="margin:0;padding:12px 14px">
        <div class="cb ${isSel?'checked':''}" onclick="${prefix}ToggleSmallCat('自定义','${sc}')"></div>
        <div class="osmall-name">${sc}</div>
        <div class="osmall-count">${wishes.length}个</div>
      </div></div>`;
    });
  }
  return html;
}

function toggleBigCatBody(h) {
  const b = h.nextElementSibling;
  const a = h.querySelector('.obig-arrow');
  b.classList.toggle('open');

// Onboard category toggle
function obToggleBigCat(bigCat) { toggleBigCatSelect(bigCat, 'ob'); }
function obToggleSmallCat(bigCat, smallCat) { toggleSmallCatSelect(bigCat, smallCat, 'ob'); }
function obSelectAll() { selectAllCats('ob'); }
function obDeselectAll() { deselectAllCats('ob'); }
function obToggleSelectAll() {
  const all = []; for (let b in HIERARCHY) for (let s in HIERARCHY[b]) all.push(s);
  all.every(s => appData.selectedSmallCats[s]) ? obDeselectAll() : obSelectAll();
}
function updateObSelectAll() {
  const cb = document.getElementById('obSelectAllCb'); if (!cb) return;
  const all = []; for (let b in HIERARCHY) for (let s in HIERARCHY[b]) all.push(s);
  const allSel = all.length > 0 && all.every(s => appData.selectedSmallCats[s]);
  const some = all.some(s => appData.selectedSmallCats[s]);
  cb.className = 'cb' + (allSel ? ' checked' : some ? ' partial' : '');
}
function updateObInfo() {
  let count = 0; for (let s in appData.selectedSmallCats) if (appData.selectedSmallCats[s]) count++;
  const info = document.getElementById('step2Info');
  const btn = document.getElementById('step2NextBtn');
  if (info) info.textContent = '已选 ' + count + ' 个分类';
  if (btn) btn.disabled = count === 0;
}

// Generic toggle functions
function toggleBigCatSelect(bigCat, prefix) {
  const sc = HIERARCHY[bigCat];
  const all = Object.keys(sc).every(s => appData.selectedSmallCats[s]);
  for (let s in sc) {
    appData.selectedSmallCats[s] = !all;
    if (!all && !appData.wishes[s]) appData.wishes[s] = [...sc[s]];
    if (all) delete appData.wishes[s];
  }
  refreshCatList(prefix);
}
function toggleSmallCatSelect(bigCat, smallCat, prefix) {
  const isSel = appData.selectedSmallCats[smallCat];
  appData.selectedSmallCats[smallCat] = !isSel;
  if (!isSel) {
    if (bigCat !== '自定义' && HIERARCHY[bigCat] && HIERARCHY[bigCat][smallCat]) {
      if (!appData.wishes[smallCat]) appData.wishes[smallCat] = [...HIERARCHY[bigCat][smallCat]];
    }
  } else {
    delete appData.wishes[smallCat];
  }
  // If bigCat has only 1 small cat, auto-collapse after selecting
  const smallCount = (bigCat !== '自定义' && HIERARCHY[bigCat]) ? Object.keys(HIERARCHY[bigCat]).length : 1;
  if (smallCount === 1) {
    const obigCat = event.target.closest('.obig-cat');
    if (obigCat) {
      // Update small cat checkbox
      const cb = event.target.closest('.cb');
      if (cb) cb.className = 'cb' + (!isSel ? ' checked' : '');
      // Update big cat header checkbox
      const headCb = obigCat.querySelector('.obig-head .cb');
      if (headCb) headCb.className = 'cb' + (!isSel ? ' checked' : '');
      // Auto-collapse
      const body = obigCat.querySelector('.obig-body');
      const arrow = obigCat.querySelector('.obig-arrow');
      if (body) body.classList.remove('open');
      if (arrow) arrow.classList.remove('open');
    }
    saveData();
    updateSelectAllByPrefix(prefix);
    updateInfoByPrefix(prefix);
  } else {
    refreshCatList(prefix);
  }
}
function updateSelectAllByPrefix(prefix) {
  if (prefix === 'ob') updateObSelectAll();
  else if (prefix === 'rs') updateRsSelectAll();
}
function updateInfoByPrefix(prefix) {
  if (prefix === 'ob') updateObInfo();
  else if (prefix === 'rs') updateRsInfo();
}
function selectAllCats(prefix) {
  for (let b in HIERARCHY) for (let s in HIERARCHY[b]) {
    appData.selectedSmallCats[s] = true;
    if (!appData.wishes[s]) appData.wishes[s] = [...HIERARCHY[b][s]];
  }
  refreshCatList(prefix);
}
function deselectAllCats(prefix) {
  appData.selectedSmallCats = {}; appData.wishes = {};
  refreshCatList(prefix);
}
function refreshCatList(prefix) {
  if (prefix === 'ob') { renderObCategoryList(); }
  else if (prefix === 'rs') { renderRsCategoryList(); }
}

// Custom wish in onboard
function obAddCustom() {
  const inp = document.getElementById('obCustomInput'), t = inp.value.trim();
  if (!t) return;
  addCustomWish(t);
  inp.value = '';
  renderObCategoryList();

function addCustomWish(text) {
  // Try to match a category from text
  let cat = null;
  for (let s of ALL_SMALL_CATS) { if (text.includes(s)) { cat = s; break; } }
  if (!cat) {
    // Find best matching bigCat
    for (let b in HIERARCHY) {
      for (let s in HIERARCHY[b]) {
        for (let w of HIERARCHY[b][s]) {
          // Simple keyword matching
          const keywords = w.replace(/[去参观看一次体验学做参加完成挑战]/g, '').substring(0, 4);
          if (text.includes(keywords) && keywords.length >= 2) { cat = s; break; }
        }
        if (cat) break;
      }
      if (cat) break;
    }
  }
  if (!cat) cat = '自我成长'; // default
  if (!appData.wishes[cat]) { appData.wishes[cat] = []; appData.customCats = appData.customCats || []; if (!appData.customCats.includes(cat)) appData.customCats.push(cat); }
  appData.wishes[cat].push(text);
  appData.selectedSmallCats[cat] = true;
  // timestamp
  appData.wishTimestamps[cat + '::' + text] = Date.now();
  saveData();
}

function finishOnboard() {

}

// HOME PAGE
// ==========================================
function renderHome() {
  if (!appData) return;
  document.getElementById('homeTitle').textContent = '🌟 ' + appData.ownerName + '的心愿清单';
  renderHomeStats();
  renderFilterBar();

}

function renderHomeStats() {
  const s = getStats();
  document.getElementById('homeStats').innerHTML = `
    <div class="home-stat" onclick="filterBy('all')"><div class="num">${s.total}</div><div class="label">全部心愿</div></div>
    <div class="home-stat green" onclick="filterBy('done')"><div class="num">${s.done}</div><div class="label">已实现</div></div>
    <div class="home-stat" onclick="filterBy('undone')"><div class="num">${s.total - s.done}</div><div class="label">进行中</div></div>
    <div class="home-stat" onclick="filterBy('done')"><div class="num">${s.pct}%</div><div class="label">完成率</div></div>`;
}

function renderFilterBar() {
  const el = document.getElementById('filterBar');
  // Get all small cats that have wishes
  const cats = [];
  for (let cat in appData.wishes) { if (appData.wishes[cat] && appData.wishes[cat].length > 0) cats.push(cat); }
  let html = `<div class="filter-chip ${currentFilter==='all'?'active':''}" onclick="filterBy('all')">全部</div>`;
  html += `<div class="filter-chip ${currentFilter==='undone'?'active':''}" onclick="filterBy('undone')">进行中</div>`;
  html += `<div class="filter-chip ${currentFilter==='done'?'active':''}" onclick="filterBy('done')">已实现</div>`;
  cats.forEach(c => {
    html += `<div class="filter-chip ${currentFilter===c?'active':''}" onclick="filterBy('${c.replace(/'/g,"\\'")}')">${c}</div>`;
  });
  el.innerHTML = html;
}

function filterBy(f) { currentFilter = f; renderFilterBar(); renderWishList(); }

function renderWishList() {
  const el = document.getElementById('wishSection');
  let wishes = [];
  for (let cat in appData.wishes) {
    for (let w of appData.wishes[cat]) {
      const key = cat + '::' + w;
      const done = !!appData.completed[key];
      const ts = appData.wishTimestamps[key] || 0;
      const doneTs = appData.completed[key] || 0;
      wishes.push({ cat, text: w, done, ts, doneTs, key });
    }
  }
  // Filter
  if (currentFilter === 'done') wishes = wishes.filter(w => w.done);
  else if (currentFilter === 'undone') wishes = wishes.filter(w => !w.done);
  else if (currentFilter !== 'all') wishes = wishes.filter(w => w.cat === currentFilter);

  // Sort: undone first (by ts desc), done last (by doneTs desc)
  const undone = wishes.filter(w => !w.done).sort((a,b) => b.ts - a.ts);
  const done = wishes.filter(w => w.done).sort((a,b) => b.doneTs - a.doneTs);

  if (wishes.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="emoji">🌟</div><div class="msg">' + (currentFilter === 'all' ? '还没有心愿，去添加吧' : '暂无匹配的心愿') + '</div></div>';
    return;
  }

  let html = '';
  if (undone.length > 0) {
    html += '<div class="wish-group-title">⏳ 进行中 (' + undone.length + ')</div>';
    undone.forEach(w => { html += renderWishItem(w); });
  }
  if (done.length > 0) {
    html += '<div class="wish-group-title" style="margin-top:8px">✅ 已实现 (' + done.length + ')</div>';
    done.forEach(w => { html += renderWishItem(w); });
  }
  el.innerHTML = html;
}

function renderWishItem(w) {
  const duration = w.done ? formatDuration(w.doneTs) : formatDuration(w.ts);
  const durationLabel = w.done ? '完成于' + duration : duration + '开始';
  return `<div class="wish-item">
    <div class="wish-cb ${w.done?'checked':''}" onclick="toggleWish('${esc(w.key)}')"></div>
    <div class="wish-content">
      <div class="wish-text ${w.done?'done':''}">${w.text}</div>
      <div class="wish-meta">
        <span class="wish-cat-tag">${w.cat}</span>
        <span class="wish-duration">${durationLabel}</span>
      </div>
    </div>
    <button class="wish-edit-btn" onclick="openEditWish('${esc(w.key)}')">✏️</button>
  </div>`;
}

function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

function formatDuration(ts) {
  if (!ts) return '未知';
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '刚刚';
  if (mins < 60) return mins + '分钟前';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + '小时前';
  const days = Math.floor(hours / 24);
  if (days < 30) return days + '天前';
  const months = Math.floor(days / 30);
  if (months < 12) return months + '个月前';
  return Math.floor(months / 12) + '年前';
}

function toggleWish(key) {
  const unesc = key.replace(/\\'/g, "'");
  if (appData.completed[unesc]) {
    delete appData.completed[unesc];
  } else {
    appData.completed[unesc] = Date.now();
  }
  saveData(); renderHome();
}

function openEditWish(key) {
  const unesc = key.replace(/\\'/g, "'");
  editingWishKey = unesc;
  const parts = unesc.split('::');
  const cat = parts[0], text = parts.slice(1).join('::');
  document.getElementById('editWishInput').value = text;
  document.getElementById('editModal').classList.add('show');
}

function closeEditModal() { document.getElementById('editModal').classList.remove('show'); editingWishKey = null; }

function saveEditWish() {
  if (!editingWishKey) return;
  const newText = document.getElementById('editWishInput').value.trim();
  if (!newText) { showToast('请输入内容'); return; }
  const parts = editingWishKey.split('::');
  const cat = parts[0], oldText = parts.slice(1).join('::');
  const wishes = appData.wishes[cat];
  if (wishes) {
    const idx = wishes.indexOf(oldText);
    if (idx >= 0) {
      wishes[idx] = newText;
      // Update keys
      const newKey = cat + '::' + newText;
      if (appData.completed[editingWishKey]) { appData.completed[newKey] = appData.completed[editingWishKey]; delete appData.completed[editingWishKey]; }
      if (appData.wishTimestamps[editingWishKey]) { appData.wishTimestamps[newKey] = appData.wishTimestamps[editingWishKey]; delete appData.wishTimestamps[editingWishKey]; }
    }
  }
  saveData(); closeEditModal(); renderHome(); showToast('已更新');
}

function addWishFromHome() {

function renderAddPage() {

function selectAddCat(cat) { addSelectedCat = cat; renderAddPage(); }

function addWishFromAddPage() {
  const inp = document.getElementById('addWishInput'), t = inp.value.trim();
  if (!t) { showToast('请输入心愿内容'); return; }
  let cat = addSelectedCat;

  }
  if (!cat) cat = '自我成长';
  if (!appData.wishes[cat]) { appData.wishes[cat] = []; appData.customCats = appData.customCats || []; if (!appData.customCats.includes(cat)) appData.customCats.push(cat); }

function renderRecentList() {
  const el = document.getElementById('recentList');
  if (!appData) return;
  let items = [];
  for (let cat in appData.wishes) {
    appData.wishes[cat].forEach((w, i) => {
      const key = cat + '::' + w;
      items.push({ cat, text: w, ts: appData.wishTimestamps[key] || 0 });
    });
  }
  items.sort((a,b) => b.ts - a.ts);
  const recent = items.slice(0, 10);
  if (!recent.length) { el.innerHTML = ''; return; }
  let html = '<h3 style="font-size:14px;font-weight:600;margin-bottom:8px">最近添加</h3>';
  recent.forEach(r => {
    html += `<div class="recent-item"><span class="recent-cat">${r.cat}</span><span class="recent-text">${r.text}</span></div>`;
  });
  el.innerHTML = html;
}

function shareCopy() {

function shareScreenshot() {

    html2canvas(target, {backgroundColor:null,scale:2}).then(canvas => {
      const a = document.createElement('a');

      a.download = '心愿清单_' + appData.ownerName + '.png';
      a.click();
      showToast('图片已保存');
    }).catch(() => showToast('保存失败'));

    // Load html2canvas dynamically
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    script.onload = () => shareScreenshot();
    script.onerror = () => showToast('加载截图库失败');
    document.head.appendChild(script);
  }
}
